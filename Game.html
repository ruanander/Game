<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Jogo da Velha</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .tabuleiro {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin-top: 30px;
    }

    .casa {
      width: 100px;
      height: 100px;
      background: #222;
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 10px;
    }

    .casa:hover {
      background: #333;
    }

    #status {
      margin-top: 20px;
      font-size: 20px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: green;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>
<body>

  <h1>🎮 Jogo da Velha</h1>
  <div id="status">Vez do jogador X</div>

  <div class="tabuleiro" id="tabuleiro"></div>

  <button onclick="reiniciar()">Reiniciar</button>

  <script>
    let jogador = "X";
    let jogoAtivo = true;
    let tabuleiro = ["", "", "", "", "", "", "", "", ""];

    const status = document.getElementById("status");
    const tabuleiroHTML = document.getElementById("tabuleiro");

    function criarTabuleiro() {
      tabuleiroHTML.innerHTML = "";
      tabuleiro.forEach((valor, index) => {
        const casa = document.createElement("div");
        casa.classList.add("casa");
        casa.innerText = valor;

        casa.addEventListener("click", () => jogar(index));
        tabuleiroHTML.appendChild(casa);
      });
    }

    function jogar(index) {
      if (tabuleiro[index] !== "" || !jogoAtivo) return;

      tabuleiro[index] = jogador;

      if (verificarVitoria()) {
        status.innerText = "🎉 Jogador " + jogador + " venceu!";
        jogoAtivo = false;
      } else if (!tabuleiro.includes("")) {
        status.innerText = "😐 Empate!";
        jogoAtivo = false;
      } else {
        jogador = jogador === "X" ? "O" : "X";
        status.innerText = "Vez do jogador " + jogador;
      }

      criarTabuleiro();
    }

    function verificarVitoria() {
      const combinacoes = [
        [0,1,2], [3,4,5], [6,7,8],
        [0,3,6], [1,4,7], [2,5,8],
        [0,4,8], [2,4,6]
      ];

      return combinacoes.some(c => 
        tabuleiro[c[0]] &&
        tabuleiro[c[0]] === tabuleiro[c[1]] &&
        tabuleiro[c[1]] === tabuleiro[c[2]]
      );
    }

    function reiniciar() {
      tabuleiro = ["", "", "", "", "", "", "", "", ""];
      jogador = "X";
      jogoAtivo = true;
      status.innerText = "Vez do jogador X";
      criarTabuleiro();
    }

    criarTabuleiro();
  </script>

</body>
</html>
